{% extends "base.html" %}
{% block content %}

<div style="max-width: 400px; margin: 60px auto;">
    <div class="card">
        <h2 style="text-align: center; color: var(--neon-blue); margin-bottom: 20px;">🔓 Access Vault Account</h2>
        
        <form method="POST" action="/login">
            <div style="margin-bottom: 15px;">
                <label for="username">Contestant Name</label>
                <input type="text" id="username" name="username" placeholder="Username..." required autocomplete="off">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label for="password">Security PIN / Password</label>
                <input type="password" id="password" name="password" placeholder="Password..." required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Unlock Profile</button>
        </form>
        
        <p style="text-align: center; margin-top: 15px; font-size: 0.9rem; color: #94a3b8;">
            New player? <a href="/register" style="color: var(--neon-purple);">Register Account</a>
        </p>
    </div>
</div>

{% endblock %}
