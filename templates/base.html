<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎡 Mega Wheel Game Show</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle, #1e1b4b, #090514);
            --card-bg: rgba(30, 27, 75, 0.75);
            --neon-blue: #38bdf8;
            --neon-green: #4ade80;
            --neon-orange: #fb923c;
            --neon-pink: #f43f5e;
            --neon-purple: #c084fc;
            --text-main: #f8fafc;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient); color: var(--text-main); min-height: 100vh;
        }

        .container { width: 90%; max-width: 800px; margin: auto; padding: 40px 10px; }

        .card {
            background: var(--card-bg); padding: 24px; margin-bottom: 20px;
            border-radius: 16px; border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover { transform: translateY(-2px); border-color: var(--neon-blue); }

        h1, h2, h3, h4 { margin-top: 0; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }

        .btn {
            background: linear-gradient(135deg, #2563eb, #06b6d4); border: none;
            padding: 12px 24px; color: white; border-radius: 10px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;
            transition: all 0.2s; display: inline-block; text-decoration: none; text-align: center;
        }
        .btn:hover { box-shadow: 0 0 15px var(--neon-blue); transform: scale(1.02); }

        .btn-spin { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
        .btn-spin:hover { box-shadow: 0 0 15px #ec4899; }

        .btn-green { background: linear-gradient(135deg, #22c55e, #15803d); }
        .btn-green:hover { box-shadow: 0 0 15px var(--neon-green); }

        .btn-orange { background: linear-gradient(135deg, #f59e0b, #b45309); }
        .btn-orange:hover { box-shadow: 0 0 15px var(--neon-orange); }

        .btn-red { background: linear-gradient(135deg, #ef4444, #b91c1c); }
        .btn-red:hover { box-shadow: 0 0 15px var(--neon-pink); }

        .btn-purple { background: linear-gradient(135deg, #a855f7, #6b21a8); }
        .btn-purple:hover { box-shadow: 0 0 15px var(--neon-purple); }

        input[type="text"], input[type="range"] {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1); background: #0f1123;
            color: white; box-sizing: border-box; font-size: 1rem;
        }
        input[type="text"]:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 8px rgba(56,189,248,0.4); }

        a { color: var(--neon-blue); text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }

        .shop { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-top: 15px; }

        .shop-card {
            background: rgba(15, 17, 35, 0.6); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px; border-radius: 12px; display: flex; flex-direction: column;
            justify-content: space-between; text-align: center;
        }
        .shop-card p { margin: 4px 0 12px 0; font-size: 0.85rem; color: #94a3b8; flex-grow: 1; }

        .alerts { margin-bottom: 20px; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; font-weight: 500; }
        .alert-success { background: rgba(34, 197, 94, 0.2); border: 1px solid var(--neon-green); color: #86efac; }
        .alert-error { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--neon-pink); color: #fca5a5; }
        .alert-warning { background: rgba(245, 158, 11, 0.2); border: 1px solid var(--neon-orange); color: #fde047; }
        .alert-info { background: rgba(56, 189, 248, 0.2); border: 1px solid var(--neon-blue); color: #bae6fd; }
    </style>
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="alerts">
                    {% for category, msg in messages %}
                        <div class="alert alert-{{ category }}">{{ msg }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
